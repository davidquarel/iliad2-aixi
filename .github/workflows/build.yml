name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pages deploy needs `pages: write` + `id-token: write`. The notebooks job also
# force-pushes generated .ipynb to the `notebooks` branch, so it needs `contents: write`.
permissions:
  contents: write
  pages: write
  id-token: write

# Pages allows at most one concurrent deploy. `cancel-in-progress: false`
# lets an in-flight deploy finish rather than getting yanked by the next push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Worksheets: each source is built twice — solutions shown (sol) and hidden
  # (nosol). The `\newif\ifsolutions` toggle is set explicitly in the file, so
  # we rewrite that line with sed before building (same trick as ./build.sh).
  # To add a worksheet: add its basename (no .tex) to the matrix `file` list
  # AND give it a title in the deploy job's title map below.
  # ---------------------------------------------------------------------------
  worksheets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: [solomonoff-all, aixi-worksheet]
        mode: [sol, nosol]
    steps:
      - uses: actions/checkout@v4

      - name: Set solutions toggle (${{ matrix.mode }})
        run: |
          set -euo pipefail
          src="${{ matrix.file }}.tex"
          tmp="${{ matrix.file }}-${{ matrix.mode }}.tex"
          if [ "${{ matrix.mode }}" = "sol" ]; then
            sed -E 's/^[[:space:]]*\\solutions(true|false)/\\solutionstrue/' "$src" > "$tmp"
          else
            sed -E 's/^[[:space:]]*\\solutions(true|false)/\\solutionsfalse/' "$src" > "$tmp"
          fi

      - name: Build PDF (pdflatex -> bibtex -> pdflatex x2)
        uses: xu-cheng/latex-action@v3
        with:
          # latexmk's auto-bibtex was leaving \cite references unresolved, so we
          # drive the passes explicitly: the main compile below is pdflatex pass 1,
          # then post_compile runs bibtex and two more pdflatex passes.
          root_file: ${{ matrix.file }}-${{ matrix.mode }}.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -file-line-error
          post_compile: |
            # Only run bibtex if this document actually cites anything; otherwise
            # bibtex aborts with "no \bibdata command" (exit 2) and fails the build.
            # (e.g. the citation-free solomonoff sheet.)
            if grep -qF '\citation' "${{ matrix.file }}-${{ matrix.mode }}.aux"; then
              bibtex ${{ matrix.file }}-${{ matrix.mode }}
            fi
            pdflatex -interaction=nonstopmode -halt-on-error -file-line-error ${{ matrix.file }}-${{ matrix.mode }}.tex
            pdflatex -interaction=nonstopmode -halt-on-error -file-line-error ${{ matrix.file }}-${{ matrix.mode }}.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: worksheet-${{ matrix.file }}-${{ matrix.mode }}
          path: ${{ matrix.file }}-${{ matrix.mode }}.pdf

  # ---------------------------------------------------------------------------
  # Slides: each deck is built twice — presentation (\pause reveals ON) and
  # handout (reveals collapsed). A one-line wrapper .tex selects the mode by
  # \def-ing \HANDOUT before \input-ing the deck (the deck's preamble adds the
  # beamer `handout` option iff \HANDOUT is defined). Builds run the explicit
  # pdflatex -> bibtex -> pdflatex x2 sequence so the References frame resolves.
  # To add a deck: add its basename to the matrix AND give it a title below.
  # ---------------------------------------------------------------------------
  slides:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: [iliad-david1-slides, vpg-slides, goalmisgen-slides]
        mode: [present, handout]
    steps:
      - uses: actions/checkout@v4

      - name: Write wrapper selecting pause mode (${{ matrix.mode }})
        run: |
          set -euo pipefail
          wrap="${{ matrix.file }}-${{ matrix.mode }}.tex"
          if [ "${{ matrix.mode }}" = "handout" ]; then
            printf '\\def\\HANDOUT{}\\input{%s}\n' "${{ matrix.file }}" > "$wrap"
          else
            printf '\\input{%s}\n' "${{ matrix.file }}" > "$wrap"
          fi

      - name: Build PDF (pdflatex -> bibtex -> pdflatex x2)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.file }}-${{ matrix.mode }}.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -file-line-error
          post_compile: |
            # Only run bibtex if this deck actually cites anything; otherwise bibtex
            # aborts with "no \bibdata command" (exit 2) and fails the build (e.g. the
            # citation-free vpg-slides deck; goalmisgen-slides DOES cite, so it runs).
            if grep -qF '\citation' "${{ matrix.file }}-${{ matrix.mode }}.aux"; then
              bibtex ${{ matrix.file }}-${{ matrix.mode }}
            fi
            pdflatex -interaction=nonstopmode -halt-on-error -file-line-error ${{ matrix.file }}-${{ matrix.mode }}.tex
            pdflatex -interaction=nonstopmode -halt-on-error -file-line-error ${{ matrix.file }}-${{ matrix.mode }}.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ matrix.file }}-${{ matrix.mode }}
          path: ${{ matrix.file }}-${{ matrix.mode }}.pdf

  # ---------------------------------------------------------------------------
  # Notebooks: generate the Colab notebooks from gen/masters/master_*.py (you
  # commit only the masters + support modules), bundle each notebook with its
  # support files, and force-push the result to the `notebooks` branch — that is
  # what Colab "Open in GitHub" reads. Mirrors how the PDFs are autogenerated,
  # except notebooks must live on a branch (Colab can't open a Pages URL).
  # To add a notebook: add an entry to gen/core/config.yaml + a master + support.
  # ---------------------------------------------------------------------------
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator deps
        run: pip install -r gen/requirements-gen.txt

      - name: Generate notebooks from masters
        run: python gen/core/main.py --chapters='2.*' --use_py=true

      - name: Bundle notebooks with their support modules (flat per-part layout)
        run: |
          set -euo pipefail
          mkdir -p nb_publish
          # 2.6 — support is a flat package dir
          cp -r gen/support/part6_goalmisgen nb_publish/part6_goalmisgen
          cp build/exercises/part6_goalmisgen/*.ipynb build/exercises/part6_goalmisgen/solutions.py nb_publish/part6_goalmisgen/
          # VPG — support preserves the ARENA package subtree (gpu_env, part1_/part2_, ...)
          cp -r gen/support/part_vpg nb_publish/part_vpg
          cp build/exercises/part_vpg/*.ipynb build/exercises/part_vpg/solutions.py nb_publish/part_vpg/
          touch nb_publish/.nojekyll
          find nb_publish -maxdepth 2 -type f | sort

      - name: Validate generated notebooks (JSON + no ARENA-clone leakage)
        run: |
          set -euo pipefail
          for nb in $(find nb_publish -name '*.ipynb'); do
            python -c "import json,sys; json.load(open('$nb')); print('valid:', '$nb')"
            if grep -q "callummcdougall/ARENA_3.0" "$nb"; then echo "LEAK: ARENA clone URL in $nb"; exit 1; fi
          done

      - name: Force-push to the `notebooks` branch (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nb_publish
          publish_branch: notebooks
          force_orphan: true
          commit_message: "regenerate notebooks from masters @ ${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Deploy: gather every built PDF, build a one-page index, publish to Pages.
  # Only runs on push to main; PRs build (above) but don't deploy.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [worksheets, slides, notebooks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all PDFs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten PDFs into public/
        run: |
          mkdir -p public
          find artifacts/ -name '*.pdf' -exec cp {} public/ \;
          # static interactive demo (self-contained single HTML file, served as-is)
          [ -e play.html ] && cp play.html public/
          touch public/.nojekyll
          ls -la public/

      - name: Generate public/index.html
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO="${{ github.repository }}"
          BUILT=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Display title for each base name. Add a row when you add a file
          # to a build matrix above.
          title_of() {
            case "$1" in
              solomonoff-all)      echo "Solomonoff Induction Exercises" ;;
              aixi-worksheet)      echo "AIXI Exercises" ;;
              iliad-david1-slides) echo "Universal AI: Solomonoff Induction &amp; AIXI" ;;
              vpg-slides)          echo "Vanilla Policy Gradient" ;;
              goalmisgen-slides)   echo "Goal Misgeneralisation &amp; Specification Gaming" ;;
              *)                   echo "$1" ;;
            esac
          }

          {
            cat <<'HEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Iliad Intensive — Solomonoff &amp; AIXI</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
                   max-width: 760px; margin: 2.5rem auto; padding: 0 1.2rem;
                   color: #222; line-height: 1.55; }
            h1 { font-size: 1.6rem; border-bottom: 1px solid #eaecef; padding-bottom: .3rem; }
            .lede { color: #57606a; margin-top: .2rem; }
            h2 { font-size: 1.15rem; margin-top: 2rem; color: #24292e; }
            ul { list-style: none; padding-left: 0; }
            li { padding: .35rem 0; }
            a { color: #0366d6; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .sep { color: #d1d5da; margin: 0 .4rem; }
            .meta { color: #6a737d; font-size: .88rem; margin-top: 2.5rem;
                    border-top: 1px solid #eaecef; padding-top: .8rem; }
            code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                   background: #f6f8fa; padding: .1rem .3rem; border-radius: 3px; font-size: .9em; }
          </style>
          </head>
          <body>
          <h1>Iliad Intensive — Solomonoff &amp; AIXI</h1>
          <p class="lede">London Initiative for Safe AI · worksheets &amp; slides, rebuilt on every push.</p>
          HEAD

            # --- Worksheets: explicit order (Solomonoff first, then AIXI) ---
            echo "<h2>Worksheets</h2>"
            echo "<ul>"
            for base in solomonoff-all aixi-worksheet; do
              [ -e "public/${base}-nosol.pdf" ] || continue
              echo "<li>$(title_of "$base")"
              [ -e "public/${base}-nosol.pdf" ] && echo "<span class=\"sep\">·</span><a href=\"./${base}-nosol.pdf\">📄 Worksheet</a>"
              [ -e "public/${base}-sol.pdf" ]   && echo "<span class=\"sep\">·</span><a href=\"./${base}-sol.pdf\">✅ With solutions</a>"
              echo "</li>"
            done
            echo "</ul>"

            # --- Slides: one row per base, with present (pauses) + handout ---
            echo "<h2>Slides</h2>"
            echo "<ul>"
            for pdf in public/*-present.pdf; do
              [ -e "$pdf" ] || continue
              base=$(basename "$pdf" -present.pdf)
              echo "<li>$(title_of "$base")"
              [ -e "public/${base}-present.pdf" ] && echo "<span class=\"sep\">·</span><a href=\"./${base}-present.pdf\">🎬 Slides (with pauses)</a>"
              [ -e "public/${base}-handout.pdf" ] && echo "<span class=\"sep\">·</span><a href=\"./${base}-handout.pdf\">📄 Handout (no pauses)</a>"
              echo "</li>"
            done
            echo "</ul>"

            # --- Interactive exercises: links open the generated notebooks in Colab ---
            echo "<h2>Interactive Exercises (Colab)</h2>"
            echo "<ul>"
            COLAB="https://colab.research.google.com/github/${REPO}/blob/notebooks"
            echo "<li>Vanilla Policy Gradient (CartPole)<span class=\"sep\">·</span><a href=\"${COLAB}/part_vpg/2.2_Vanilla_Policy_Gradient_exercises.ipynb\">📓 Exercises</a><span class=\"sep\">·</span><a href=\"${COLAB}/part_vpg/2.2_Vanilla_Policy_Gradient_solutions.ipynb\">✅ Solutions</a></li>"
            echo "<li>Goal Misgeneralisation &amp; Specification Gaming<span class=\"sep\">·</span><a href=\"${COLAB}/part6_goalmisgen/2.6_Specification_Gaming_and_Goal_Misgeneralisation_exercises.ipynb\">📓 Exercises</a><span class=\"sep\">·</span><a href=\"${COLAB}/part6_goalmisgen/2.6_Specification_Gaming_and_Goal_Misgeneralisation_solutions.ipynb\">✅ Solutions</a></li>"
            echo "</ul>"

            # --- Interactive demo: the in-browser pottery shop grid world ---
            if [ -e public/play.html ]; then
              echo "<h2>Interactive Demo</h2>"
              echo "<ul><li>Pottery shop grid world (goal misgeneralisation)<span class=\"sep\">·</span><a href=\"./play.html\">🎮 Play in your browser</a></li></ul>"
            fi

            echo "<p class=\"meta\">Built ${BUILT} from commit <code>${SHA_SHORT}</code> · source: <a href=\"https://github.com/${REPO}\">github.com/${REPO}</a></p>"
            echo "</body></html>"
          } > public/index.html

          echo "----- public/index.html -----"
          cat public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
