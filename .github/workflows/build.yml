name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pages deploy needs `pages: write` + `id-token: write`. The notebooks job also
# force-pushes generated .ipynb to the `notebooks` branch, so it needs `contents: write`.
permissions:
  contents: write
  pages: write
  id-token: write

# Pages allows at most one concurrent deploy. `cancel-in-progress: false`
# lets an in-flight deploy finish rather than getting yanked by the next push.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build: every worksheet (sol + nosol) and every slide deck (present + handout)
  # is built sequentially inside ONE container. The TeX Live image that
  # xu-cheng/latex-action ships is multi-GB; a matrix would re-pull it once per
  # combination (~2 min each, ~20 billed min total). Building everything in a
  # single job pays that pull ONCE: the action's first compile triggers the
  # pull, then post_compile builds every target in the same container. Each
  # individual compile is only ~5 s, so amortizing the pull is the whole win.
  #
  # Worksheets toggle solutions via the `\solutions(true|false)` line (rewritten
  # with sed, same trick as ./build.sh). Slides select pause mode via a one-line
  # wrapper that \def-s \HANDOUT before \input-ing the deck. Each target runs
  # pdflatex -> (bibtex iff it cites) -> pdflatex x2 so xrefs/References resolve.
  #
  # To add a worksheet: add its basename to WORKSHEETS + the deploy title map.
  # To add a slide deck: add its basename to SLIDES + the deploy title map.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare toggled / wrapped sources
        run: |
          set -euo pipefail
          # Worksheets: sol (solutions shown) + nosol (hidden)
          for file in solomonoff-all aixi-worksheet; do
            sed -E 's/^[[:space:]]*\\solutions(true|false)/\\solutionstrue/'  "$file.tex" > "$file-sol.tex"
            sed -E 's/^[[:space:]]*\\solutions(true|false)/\\solutionsfalse/' "$file.tex" > "$file-nosol.tex"
          done
          # Slides: present (\pause reveals ON) + handout (collapsed)
          for file in si_and_aixi_slides vpg-slides goalmisgen-slides; do
            printf '\\input{%s}\n'                  "$file" > "$file-present.tex"
            printf '\\def\\HANDOUT{}\\input{%s}\n'   "$file" > "$file-handout.tex"
          done

      - name: Build all PDFs in one TeX Live container
        uses: xu-cheng/latex-action@v3
        with:
          # root_file just triggers the single image pull; the real work (the
          # full pdflatex -> bibtex -> pdflatex x2 sequence for EVERY target,
          # including this one) happens in post_compile, in the same container.
          root_file: solomonoff-all-sol.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -file-line-error
          post_compile: |
            set -uo pipefail
            # pdflatex -> (bibtex iff the doc cites anything) -> pdflatex x2
            compile() {
              local base="$1"
              pdflatex -interaction=nonstopmode -halt-on-error -file-line-error "$base.tex" || return 1
              if grep -qF '\citation' "$base.aux" 2>/dev/null; then
                bibtex "$base" || return 1
              fi
              pdflatex -interaction=nonstopmode -halt-on-error -file-line-error "$base.tex" || return 1
              pdflatex -interaction=nonstopmode -halt-on-error -file-line-error "$base.tex" || return 1
            }
            fail=0
            for base in \
              solomonoff-all-sol solomonoff-all-nosol \
              aixi-worksheet-sol aixi-worksheet-nosol \
              si_and_aixi_slides-present si_and_aixi_slides-handout \
              vpg-slides-present vpg-slides-handout \
              goalmisgen-slides-present goalmisgen-slides-handout; do
              echo "::group::build $base"
              compile "$base" || { echo "::error::build failed: $base"; fail=1; }
              echo "::endgroup::"
            done
            echo "Built PDFs:"; ls -1 *.pdf || true
            exit $fail

      - name: Upload all PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          if-no-files-found: error
          # This artifact is only an in-run hand-off to the deploy job; the
          # durable, latest-only copy lives on GitHub Pages (which overwrites
          # each deploy and never expires). So keep artifacts the minimum time.
          retention-days: 1
          path: |
            solomonoff-all-sol.pdf
            solomonoff-all-nosol.pdf
            aixi-worksheet-sol.pdf
            aixi-worksheet-nosol.pdf
            si_and_aixi_slides-present.pdf
            si_and_aixi_slides-handout.pdf
            vpg-slides-present.pdf
            vpg-slides-handout.pdf
            goalmisgen-slides-present.pdf
            goalmisgen-slides-handout.pdf

  # ---------------------------------------------------------------------------
  # Notebooks: generate the Colab notebooks from gen/masters/master_*.py (you
  # commit only the masters + support modules), bundle each notebook with its
  # support files, and force-push the result to the `notebooks` branch — that is
  # what Colab "Open in GitHub" reads. Mirrors how the PDFs are autogenerated,
  # except notebooks must live on a branch (Colab can't open a Pages URL).
  # To add a notebook: add an entry to gen/core/config.yaml + a master + support.
  # ---------------------------------------------------------------------------
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator deps
        run: pip install -r gen/requirements-gen.txt

      - name: Generate notebooks from masters
        run: python gen/core/main.py --chapters='2.*' --use_py=true

      - name: Bundle notebooks with their support modules (flat per-part layout)
        run: |
          set -euo pipefail
          mkdir -p nb_publish
          # 2.6 — support is a flat package dir
          cp -r gen/support/part6_goalmisgen nb_publish/part6_goalmisgen
          cp build/exercises/part6_goalmisgen/*.ipynb build/exercises/part6_goalmisgen/solutions.py nb_publish/part6_goalmisgen/
          # VPG — support preserves the ARENA package subtree (gpu_env, part1_/part2_, ...)
          cp -r gen/support/part_vpg nb_publish/part_vpg
          cp build/exercises/part_vpg/*.ipynb build/exercises/part_vpg/solutions.py nb_publish/part_vpg/
          touch nb_publish/.nojekyll
          find nb_publish -maxdepth 2 -type f | sort

      - name: Validate generated notebooks (JSON + no ARENA-clone leakage)
        run: |
          set -euo pipefail
          for nb in $(find nb_publish -name '*.ipynb'); do
            python -c "import json,sys; json.load(open('$nb')); print('valid:', '$nb')"
            if grep -q "callummcdougall/ARENA_3.0" "$nb"; then echo "LEAK: ARENA clone URL in $nb"; exit 1; fi
          done

      - name: Force-push to the `notebooks` branch (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nb_publish
          publish_branch: notebooks
          force_orphan: true
          commit_message: "regenerate notebooks from masters @ ${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Deploy: gather every built PDF, build a one-page index, publish to Pages.
  # Only runs on push to main; PRs build (above) but don't deploy.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [build, notebooks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all PDFs
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten PDFs into public/
        run: |
          mkdir -p public
          find artifacts/ -name '*.pdf' -exec cp {} public/ \;
          # static interactive demo (self-contained single HTML file, served as-is)
          [ -e play.html ] && cp play.html public/
          touch public/.nojekyll
          ls -la public/

      - name: Generate public/index.html
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO="${{ github.repository }}"
          BUILT=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Display title for each base name. Add a row when you add a file
          # to a build matrix above.
          title_of() {
            case "$1" in
              solomonoff-all)      echo "Solomonoff Induction Exercises" ;;
              aixi-worksheet)      echo "AIXI Exercises" ;;
              si_and_aixi_slides) echo "Universal AI: Solomonoff Induction &amp; AIXI" ;;
              vpg-slides)          echo "Vanilla Policy Gradient" ;;
              goalmisgen-slides)   echo "Goal Misgeneralisation &amp; Specification Gaming" ;;
              *)                   echo "$1" ;;
            esac
          }

          {
            cat <<'HEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Iliad Intensive</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
                   max-width: 760px; margin: 2.5rem auto; padding: 0 1.2rem;
                   color: #222; line-height: 1.55; }
            h1 { font-size: 1.6rem; border-bottom: 1px solid #eaecef; padding-bottom: .3rem; }
            .lede { color: #57606a; margin-top: .2rem; }
            h2 { font-size: 1.25rem; margin-top: 2.2rem; color: #24292e;
                 border-bottom: 1px solid #eaecef; padding-bottom: .2rem; }
            h3 { font-size: 1rem; margin: 1.1rem 0 .2rem; color: #57606a; font-weight: 600; }
            table.r { width: 100%; border-collapse: collapse; margin: .2rem 0 .9rem; }
            table.r td { padding: .35rem 0; border-bottom: 1px solid #f0f2f4; vertical-align: baseline; }
            td.name { text-align: left; }
            td.links { text-align: right; white-space: nowrap; padding-left: 1.2rem; }
            a { color: #0366d6; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .sep { color: #d1d5da; margin: 0 .4rem; }
            .meta { color: #6a737d; font-size: .88rem; margin-top: 2.5rem;
                    border-top: 1px solid #eaecef; padding-top: .8rem; }
            code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                   background: #f6f8fa; padding: .1rem .3rem; border-radius: 3px; font-size: .9em; }
          </style>
          </head>
          <body>
          <h1>Iliad Intensive</h1>
          HEAD

            # emit one table row: $1 = name (left), $2 = links blob (right)
            row() { echo "<tr><td class=\"name\">$1</td><td class=\"links\">$2</td></tr>"; }
            # slides row (present + handout) for a deck base name; nothing if its PDF is absent
            slide_row() {
              [ -e "public/$1-present.pdf" ] || return 0
              s="<a href=\"./$1-present.pdf\">🎬 Slides</a>"
              [ -e "public/$1-handout.pdf" ] && s="$s<span class=\"sep\">·</span><a href=\"./$1-handout.pdf\">📄 Handout</a>"
              row "$(title_of "$1")" "$s"
            }
            # worksheet row (no-solutions + solutions) for a base name
            worksheet_row() {
              [ -e "public/$1-nosol.pdf" ] || return 0
              s="<a href=\"./$1-nosol.pdf\">📄 Worksheet</a>"
              [ -e "public/$1-sol.pdf" ] && s="$s<span class=\"sep\">·</span><a href=\"./$1-sol.pdf\">✅ With solutions</a>"
              row "$(title_of "$1")" "$s"
            }

            COLAB="https://colab.research.google.com/github/${REPO}/blob/notebooks"

            # ===== D.2 Policy Gradients and Misgeneralization =====
            echo "<h2>D.2 Policy Gradients and Misgeneralization</h2>"
            echo "<h3>Slides</h3><table class=\"r\">"
            slide_row vpg-slides
            slide_row goalmisgen-slides
            echo "</table>"
            echo "<h3>Interactive exercises (Colab)</h3><table class=\"r\">"
            row "Vanilla Policy Gradient (CartPole)" "<a href=\"${COLAB}/part_vpg/2.2_Vanilla_Policy_Gradient_exercises.ipynb\">📓 Exercises</a><span class=\"sep\">·</span><a href=\"${COLAB}/part_vpg/2.2_Vanilla_Policy_Gradient_solutions.ipynb\">✅ Solutions</a>"
            row "Goal Misgeneralisation &amp; Specification Gaming" "<a href=\"${COLAB}/part6_goalmisgen/2.6_Specification_Gaming_and_Goal_Misgeneralisation_exercises.ipynb\">📓 Exercises</a><span class=\"sep\">·</span><a href=\"${COLAB}/part6_goalmisgen/2.6_Specification_Gaming_and_Goal_Misgeneralisation_solutions.ipynb\">✅ Solutions</a>"
            echo "</table>"
            if [ -e public/play.html ]; then
              echo "<h3>Interactive demo</h3><table class=\"r\">"
              row "Pottery shop grid world" "<a href=\"./play.html\">🎮 Play in your browser</a>"
              echo "</table>"
            fi

            # ===== D.3 Solomonoff Induction and AIXI =====
            echo "<h2>D.3 Solomonoff Induction and AIXI</h2>"
            echo "<h3>Slides</h3><table class=\"r\">"
            slide_row si_and_aixi_slides
            echo "</table>"
            echo "<h3>Worksheets</h3><table class=\"r\">"
            worksheet_row solomonoff-all
            worksheet_row aixi-worksheet
            echo "</table>"

            echo "<p class=\"meta\">Built ${BUILT} from commit <code>${SHA_SHORT}</code> · source: <a href=\"https://github.com/${REPO}\">github.com/${REPO}</a></p>"
            echo "</body></html>"
          } > public/index.html

          echo "----- public/index.html -----"
          cat public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
